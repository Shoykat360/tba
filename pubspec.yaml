name: tba_assessment
description: Flutter Technical Assessment Project
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Functional Programming
  dartz: ^0.10.1

  # Dependency Injection
  get_it: ^7.7.0

  # Serialization
  json_annotation: ^4.9.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2

  # Location
  geolocator: ^13.0.2

  # Camera
  camera: ^0.11.0+2

  # File System
  path_provider: ^2.1.4

  # Background Worker
  workmanager: ^0.6.0

  # Connectivity
  connectivity_plus: ^6.1.1

  # Permissions
  permission_handler: ^11.3.1

  # Utilities
  uuid: ^4.4.2
  intl: ^0.20.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  # ✅ build_runner kept for any future codegen needs
  build_runner: ^2.4.13
  # ✅ hive_generator REMOVED — not needed since models use Box<Map> directly

flutter:
  uses-material-design: true