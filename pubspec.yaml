name: tba_assessment
description: Flutter Technical Assessment Project
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # State Management
  flutter_bloc: ^8.1.4
  bloc: ^8.1.4
  equatable: ^2.0.5
  # Functional Programming
  dartz: ^0.10.1

  # Dependency Injection
  get_it: ^7.7.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  shared_preferences: ^2.2.1

  # Location
  geolocator: ^11.0.0

  # Camera
  camera: ^0.10.5+9

  # File System
  path_provider: ^2.1.2

  # Background Worker
  workmanager: ^0.9.0+3

  # Connectivity
  connectivity_plus: ^5.0.2

  # Permissions
  permission_handler: ^11.3.0

  # Utilities
  uuid: ^4.3.3
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.6
  mocktail: ^1.0.3
  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true
